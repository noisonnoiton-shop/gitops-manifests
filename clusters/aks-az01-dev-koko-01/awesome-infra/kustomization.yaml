namespace: awesome-infra

resources:
- ./namespaces.yaml
- ../../../base/awesome-infra

labels:
- includeTemplates: true
  pairs:
    env: prd
    system: awesome-infra

patches:
- patch: |-
    kind: not-important
    metadata:
      name: mysql
    spec:
      template:
        spec:
          containers:
            - name: mysql
              env:
                - name: MYSQL_ROOT_PASSWORD
                  value: "adminpass1!"
      #         volumeMounts:
      #         - name: mysql-data
      #           mountPath: /var/lib/mysql
      # volumeClaimTemplates:
      #   - apiVersion: v1	
      #     kind: PersistentVolumeClaim	
      #     metadata:
      #       name: mysql-data
      #     spec:
      #       accessModes: ["ReadWriteOnce"]
      #       resources:
      #         requests:
      #           storage: 32Gi
      #       storageClassName: default
  target:
    kind: (StatefulSet)
    name: mysql
- patch: |-
    kind: not-important
    metadata:
      name: rabbitmq
    spec:
      template:
        spec:
          containers:
            - name: rabbitmq
              env:
                - name: RABBITMQ_DEFAULT_USER
                  value: "admin"
                - name: RABBITMQ_DEFAULT_PASS
                  value: "adminpass1!"
  target:
    kind: (Deployment)
    name: rabbitmq
- patch: |-
    kind: not-important
    metadata:
      name: not-important
    spec:
      template:
        spec:
          tolerations:
            - key: MGMT
              operator: Exists
  target:
    kind: (Deployment|StatefulSet)
