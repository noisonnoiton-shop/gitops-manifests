apiVersion: v1
kind: Namespace
metadata:
  labels:
    env: prd
    system: awesome-infra
  name: awesome-infra
---
apiVersion: v1
kind: Service
metadata:
  labels:
    env: prd
    system: awesome-infra
  name: mysql
  namespace: awesome-infra
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: mysql
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: rabbitmq
    env: prd
    system: awesome-infra
  name: rabbitmq
  namespace: awesome-infra
spec:
  ports:
  - name: queue
    port: 5672
    targetPort: 5672
  - name: web
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: redis
    env: prd
    system: awesome-infra
  name: redis
  namespace: awesome-infra
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rabbitmq
    env: prd
    system: awesome-infra
  name: rabbitmq
  namespace: awesome-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rabbitmq
        env: prd
        system: awesome-infra
    spec:
      containers:
      - env:
        - name: RABBITMQ_DEFAULT_USER
          value: admin
        - name: RABBITMQ_DEFAULT_PASS
          value: adminpass1!
        image: rabbitmq:management
        imagePullPolicy: IfNotPresent
        name: rabbitmq
        ports:
        - containerPort: 5672
        - containerPort: 15672
      tolerations:
      - key: MGMT
        operator: Exists
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redis
    env: prd
    system: awesome-infra
  name: redis
  namespace: awesome-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
        env: prd
        system: awesome-infra
    spec:
      containers:
      - env: []
        image: redis:latest
        imagePullPolicy: IfNotPresent
        name: redis
        ports:
        - containerPort: 6379
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 300m
            memory: 256Mi
      tolerations:
      - key: MGMT
        operator: Exists
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: mysql
    env: prd
    system: awesome-infra
  name: mysql
  namespace: awesome-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  serviceName: mysql
  template:
    metadata:
      labels:
        app: mysql
        env: prd
        system: awesome-infra
    spec:
      containers:
      - env:
        - name: MYSQL_ROOT_PASSWORD
          value: adminpass1!
        image: mysql:8.0.21
        name: mysql
        resources:
          limits:
            cpu: 600m
            memory: 512Mi
          requests:
            cpu: 300m
            memory: 256Mi
      tolerations:
      - key: MGMT
        operator: Exists
