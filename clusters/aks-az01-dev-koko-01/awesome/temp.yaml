apiVersion: v1
data:
  application-prd.yml: |
    spring:
      application:
        name: awesome-rabbitmq-consumer-service

      rabbitmq:
        addresses: rabbitmq.awesome-infra.svc.cluster.local
        username: admin
        password: adminpass1!
        listener:
          simple:
            retry:
              enabled: true
              max-attempts: 3

      cloud:
        function:
          definition: accountCreated;productSoldOut;productAmountAdded;productAmountSubtractFailed;paymentCreateFailed;paymentPaid;paymentCreated;orderPaymentCanceled;orderPaymentCreated;orderProductCanceled;orderProductCreated;
        stream:
          bindings:
            # account
            accountCreated-in-0:
              destination: accountTopic
              group: account.accountCreated
              content-type: application/json
            # cart
            productSoldOut-in-0:
              destination: productTopic
              group: cart.productSoldOut
              content-type: application/json
            productAmountAdded-in-0:
              destination: productTopic
              group: cart.productAmountAdded
              content-type: application/json
            # order
            productAmountSubtractFailed-in-0:
              destination: productTopic
              group: order.productAmountSubtractFailed
              content-type: application/json
            paymentCreateFailed-in-0:
              destination: paymentTopic
              group: order.paymentCreateFailed
              content-type: application/json
            paymentPaid-in-0:
              destination: paymentTopic
              group: order.paymentPaid
              content-type: application/json
            paymentCreated-in-0:
              destination: paymentTopic
              group: order.paymentCreated
              content-type: application/json
            # payment
            orderPaymentCanceled-in-0:
              destination: orderTopic
              group: payment.orderCanceled
              content-type: application/json
            orderPaymentCreated-in-0:
              destination: orderTopic
              group: payment.orderCreated
              content-type: application/json
            # product
            orderProductCanceled-in-0:
              destination: orderTopic
              group: product.orderCanceled
              content-type: application/json
            orderProductCreated-in-0:
              destination: orderTopic
              group: product.orderCreated
              content-type: application/json
          rabbit:
            bindings:
              # account
              accountCreated-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: account.AccountCreated.#
              # cart
              productSoldOut-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: product.ProductSoldOut.#
              productAmountAdded-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: product.ProductAmountAdded.#
              # order
              productAmountSubtractFailed-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: product.ProductAmountSubtractFailed.#
              paymentCreateFailed-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: payment.PaymentCreateFailed.#
              paymentPaid-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: payment.PaymentPaid.#
              paymentCreated-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: payment.PaymentCreated.#
              # payment
              orderPaymentCanceled-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: order.OrderCanceled.#
              orderPaymentCreated-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: order.OrderCreated.#
              # product
              orderProductCanceled-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: order.OrderCanceled.#
              orderProductCreated-in-0:
                consumer:
                  autoBindDlq: true
                  bindingRoutingKey: order.OrderCreated.#

    api:
      account:
        url: http://awesome-apigateway.awesome:8080/account
      cart:
        url: http://awesome-apigateway.awesome:8080/cart
      order:
        url: http://awesome-apigateway.awesome:8080/order
      payment:
        url: http://awesome-apigateway.awesome:8080/payment
      product:
        url: http://awesome-apigateway.awesome:8080/product
  application.yml: "spring:\n  config:\n    import: \n      - file:/config/application-prd.yml\n\nlogging:\n
    \ level:\n    org.springframework.boot: INFO\n    org.springframework.core : INFO\n\nmanagement:\n
    \ endpoints:\n    web:\n      exposure:\n        include:\n        - \"*\"\n"
